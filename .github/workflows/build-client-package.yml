name: Build Client Package

on:
  workflow_dispatch:
    inputs:
      company:
        description: 'Customer company name'
        required: true
        type: string
      expires:
        description: 'License expiration date (YYYY-MM-DD)'
        required: true
        type: string
      machines:
        description: 'Number of allowed machines'
        required: false
        default: '1'
        type: string
      platform:
        description: 'Target platform'
        required: true
        type: choice
        options:
          - windows
          - macos
      upload_to_drive:
        description: 'Upload ZIP to Google Drive'
        required: false
        default: false
        type: boolean

jobs:
  build-windows:
    runs-on: windows-latest
    if: github.event.inputs.platform == 'windows'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~\AppData\Local\pip\Cache
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade-strategy only-if-needed --no-warn-script-location -r requirements.txt
    
    - name: Generate keys (if needed)
      shell: pwsh
      env:
        PYTHONIOENCODING: utf-8
      run: |
        if (-not (Test-Path "tools\private_key.pem")) {
          python tools\license_generator.py generate-keys --output-dir tools
          Copy-Item tools\public_key.pem pdf_merger\licensing\public_key.pem
        }
      continue-on-error: true
    
    - name: Generate license
      shell: pwsh
      env:
        PYTHONIOENCODING: utf-8
      run: |
        python tools\license_generator.py generate-license `
          --company "${{ github.event.inputs.company }}" `
          --expires "${{ github.event.inputs.expires }}" `
          --machines ${{ github.event.inputs.machines }} `
          --output deliveries\license.json
    
    - name: Build Windows executable
      shell: cmd
      run: |
        build_config\build.bat
    
    - name: Create delivery package directory
      shell: pwsh
      id: set-delivery-name
      run: |
        $date = Get-Date -Format 'yyyyMMdd'
        $safeCompany = "${{ github.event.inputs.company }}" -replace '[^a-zA-Z0-9 _-]', '' -replace ' ', '_'
        $deliveryName = "PDF_Batch_Merger_${safeCompany}_${date}"
        New-Item -ItemType Directory -Path "deliveries\$deliveryName" -Force | Out-Null
        Write-Output "DELIVERY_NAME=$deliveryName" | Out-File -FilePath $env:GITHUB_ENV -Append
        Write-Output "delivery-name=$deliveryName" >> $env:GITHUB_OUTPUT
    
    - name: Copy application and files
      shell: pwsh
      run: |
        $deliveryName = "${{ steps.set-delivery-name.outputs.delivery-name }}"
        Copy-Item "dist\PDF Batch Merger.exe" "deliveries\$deliveryName\PDF Batch Merger.exe"
        Copy-Item "deliveries\license.json" "deliveries\$deliveryName\license.json"
        Copy-Item "docs\README_USER.md" "deliveries\$deliveryName\User_Guide.md"
    
    - name: Create installation instructions
      shell: pwsh
      run: |
        $deliveryName = "${{ steps.set-delivery-name.outputs.delivery-name }}"
        $company = "${{ github.event.inputs.company }}"
        $instructions = "PDF Batch Merger - Installation Instructions`n"
        $instructions += "==================================================`n`n"
        $instructions += "Company: $company`n"
        $instructions += "Version: 1.0.0`n"
        $instructions += "Platform: WINDOWS`n`n"
        $instructions += "INSTALLATION:`n"
        $instructions += "--------------------------------------------------`n`n"
        $instructions += "1. Copy 'PDF Batch Merger.exe' to your desired location`n"
        $instructions += "2. Copy 'license.json' to the same folder as the .exe`n"
        $instructions += "   (or to %USERPROFILE%\.pdf_merger\ directory)`n"
        $instructions += "3. Double-click 'PDF Batch Merger.exe' to launch`n`n"
        $instructions += "SUPPORT:`n"
        $instructions += "--------------------------------------------------`n"
        $instructions += "For technical support or license renewal, contact your software provider.`n"
        $instructions | Out-File -FilePath "deliveries\$deliveryName\INSTALLATION_INSTRUCTIONS.txt" -Encoding utf8
    
    - name: Create zip file with folder structure
      shell: pwsh
      run: |
        $deliveryName = "${{ steps.set-delivery-name.outputs.delivery-name }}"
        Compress-Archive -Path "deliveries\$deliveryName" -DestinationPath "deliveries\$deliveryName.zip" -Force
    
    - name: Write Google Drive credentials to temp file
      if: github.event.inputs.upload_to_drive == 'true'
      shell: pwsh
      env:
        GOOGLE_DRIVE_API_KEY: ${{ secrets.GOOGLE_DRIVE_API_KEY }}
      run: |
        $credPath = Join-Path $env:RUNNER_TEMP "gcp_sa_key.json"
        Set-Content -Path $credPath -Value "$env:GOOGLE_DRIVE_API_KEY" -NoNewline -Encoding utf8
    
    - name: Upload ZIP to Google Drive
      if: github.event.inputs.upload_to_drive == 'true'
      shell: pwsh
      env:
        GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
      run: |
        $credPath = Join-Path $env:RUNNER_TEMP "gcp_sa_key.json"
        $deliveryName = "${{ steps.set-delivery-name.outputs.delivery-name }}"
        python tools\upload_to_drive.py `
          --credentials "$credPath" `
          --folder-id "$env:GOOGLE_DRIVE_FOLDER_ID" `
          --file-path "deliveries\$deliveryName.zip" `
          --mime-type "application/zip" `
          --overwrite "skip"
    
    - name: Delete Google Drive credentials file
      if: github.event.inputs.upload_to_drive == 'true'
      shell: pwsh
      run: |
        $credPath = Join-Path $env:RUNNER_TEMP "gcp_sa_key.json"
        if (Test-Path $credPath) { Remove-Item $credPath -Force }
    
    - name: Upload client package
      uses: actions/upload-artifact@v4
      with:
        name: client-package-windows-${{ github.event.inputs.company }}-${{ github.run_number }}
        path: deliveries/${{ steps.set-delivery-name.outputs.delivery-name }}.zip
        retention-days: 30

  build-macos:
    runs-on: macos-latest
    if: github.event.inputs.platform == 'macos'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 1
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    
    - name: Cache pip dependencies
      uses: actions/cache@v4
      with:
        path: ~/Library/Caches/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install --upgrade-strategy only-if-needed --no-warn-script-location -r requirements.txt
    
    - name: Generate keys (if needed)
      run: |
        if [ ! -f "tools/private_key.pem" ]; then
          python tools/license_generator.py generate-keys --output-dir tools
          cp tools/public_key.pem pdf_merger/licensing/public_key.pem
        fi
      continue-on-error: true
    
    - name: Generate license
      run: |
        python tools/license_generator.py generate-license \
          --company "${{ github.event.inputs.company }}" \
          --expires "${{ github.event.inputs.expires }}" \
          --machines ${{ github.event.inputs.machines }} \
          --output deliveries/license.json
    
    - name: Make build script executable
      run: |
        chmod +x build_config/build.sh
    
    - name: Build macOS application
      run: |
        build_config/build.sh
    
    - name: Create delivery package directory
      id: set-delivery-name
      run: |
        DATE=$(date +%Y%m%d)
        SAFE_COMPANY=$(echo "${{ github.event.inputs.company }}" | sed 's/[^a-zA-Z0-9 _-]//g' | tr ' ' '_')
        DELIVERY_NAME="PDF_Batch_Merger_${SAFE_COMPANY}_${DATE}"
        mkdir -p "deliveries/${DELIVERY_NAME}"
        echo "DELIVERY_NAME=${DELIVERY_NAME}" >> $GITHUB_ENV
        echo "delivery-name=${DELIVERY_NAME}" >> $GITHUB_OUTPUT
    
    - name: Copy application and files
      run: |
        DELIVERY_NAME="${{ steps.set-delivery-name.outputs.delivery-name }}"
        cp -R "dist/PDF Batch Merger.app" "deliveries/${DELIVERY_NAME}/PDF Batch Merger.app"
        cp deliveries/license.json "deliveries/${DELIVERY_NAME}/license.json"
        cp docs/README_USER.md "deliveries/${DELIVERY_NAME}/User_Guide.md"
    
    - name: Create installation instructions
      run: |
        DELIVERY_NAME="${{ steps.set-delivery-name.outputs.delivery-name }}"
        COMPANY="${{ github.event.inputs.company }}"
        {
          echo "PDF Batch Merger - Installation Instructions"
          echo "=================================================="
          echo ""
          echo "Company: ${COMPANY}"
          echo "Version: 1.0.0"
          echo "Platform: MACOS"
          echo ""
          echo "INSTALLATION:"
          echo "--------------------------------------------------"
          echo ""
          echo "1. Copy 'PDF Batch Merger.app' to your Applications folder"
          echo "2. Copy 'license.json' to the same folder as the app"
          echo "   (or to ~/.pdf_merger/ directory)"
          echo "3. Double-click 'PDF Batch Merger.app' to launch"
          echo ""
          echo "SUPPORT:"
          echo "--------------------------------------------------"
          echo "For technical support or license renewal, contact your software provider."
        } > "deliveries/${DELIVERY_NAME}/INSTALLATION_INSTRUCTIONS.txt"
    
    - name: Create zip file with folder structure
      run: |
        DELIVERY_NAME="${{ steps.set-delivery-name.outputs.delivery-name }}"
        cd deliveries
        zip -r "${DELIVERY_NAME}.zip" "${DELIVERY_NAME}"
    
    - name: Write Google Drive credentials to temp file
      if: github.event.inputs.upload_to_drive == 'true'
      env:
        GOOGLE_DRIVE_API_KEY: ${{ secrets.GOOGLE_DRIVE_API_KEY }}
      run: |
        CRED_PATH="$RUNNER_TEMP/gcp_sa_key.json"
        printf '%s' "$GOOGLE_DRIVE_API_KEY" > "$CRED_PATH"
        chmod 600 "$CRED_PATH"
    
    - name: Upload ZIP to Google Drive
      if: github.event.inputs.upload_to_drive == 'true'
      env:
        GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
      run: |
        CRED_PATH="$RUNNER_TEMP/gcp_sa_key.json"
        DELIVERY_NAME="${{ steps.set-delivery-name.outputs.delivery-name }}"
        python tools/upload_to_drive.py \
          --credentials "$CRED_PATH" \
          --folder-id "$GOOGLE_DRIVE_FOLDER_ID" \
          --file-path "deliveries/${DELIVERY_NAME}.zip" \
          --mime-type "application/zip" \
          --overwrite "skip"
    
    - name: Delete Google Drive credentials file
      if: github.event.inputs.upload_to_drive == 'true'
      run: |
        CRED_PATH="$RUNNER_TEMP/gcp_sa_key.json"
        [ -f "$CRED_PATH" ] && rm -f "$CRED_PATH"
    
    - name: Upload client package
      uses: actions/upload-artifact@v4
      with:
        name: client-package-macos-${{ github.event.inputs.company }}-${{ github.run_number }}
        path: deliveries/${{ steps.set-delivery-name.outputs.delivery-name }}.zip
        retention-days: 30
